<!DOCTYPE html>
<html lang="Es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Panel de Administración</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- TOPBAR (solo visible en móvil) -->
    <div class="topbar">
        <div class="title-business">
            <span>JUANITO SAC</span>
        </div>
        <div class="btn-menu">
            <button class="hamburger" aria-label="Abrir menú">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">Dashboard</div>
        <ul>
            <li>
                <a href="#" class="activo" data-page="home">
                    <i class="fa-solid fa-house"></i>
                    <span>Inicio</span>
                </a>
            </li>
            <li>
                <a href="#" data-page="reportes">
                    <i class="fa-solid fa-clipboard-list"></i>
                    <span>Reportes</span>
                </a>
            </li>
            <li class="nav-logout">
                <a href="#" id="btn-logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Cerrar sesión</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main>
        <nav class="breadcrumb">
            <span>Inicio</span>
            <i class="fa-solid fa-chevron-right"></i>
            <span id="breadcrumb-page">Clientes</span>
        </nav>
        <div class="main-content">
            <div class="mb-2 d-flex justify-content-between align-items-center">
                <h4 class="mb-0">REPORTE DE CLIENTES</h4>
                <button class="btn btn-primary">REGISTRAR</button>
            </div>
            <div class="table-responsive">
                <table class="table">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Apellido</th>
                            <th>DNI</th>
                            <th>Telefono</th>
                            <th>Dirección</th>
                            <th>Opciones</th>
                        </tr>
                    </thead>
                    <tbody id="table-cliente">

                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
